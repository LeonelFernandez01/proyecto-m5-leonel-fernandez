<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Glow filter -->
    <filter id="aura-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="25" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    
    <!-- Gradients -->
    <linearGradient id="gradient-primary" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#818cf8" />
      <stop offset="50%" stop-color="#6366f1" />
      <stop offset="100%" stop-color="#a855f7" />
    </linearGradient>

    <radialGradient id="aura-bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.35" />
      <stop offset="60%" stop-color="#a855f7" stop-opacity="0.08" />
      <stop offset="100%" stop-color="#0f172a" stop-opacity="0" />
    </radialGradient>
  </defs>

  <!-- Ambient Aura Glow (Background) -->
  <circle cx="256" cy="256" r="220" fill="url(#aura-bg)" filter="url(#aura-glow)" />

  <!-- Logo Shape: Glowing Stylized 'A' -->
  <g filter="url(#aura-glow)">
    <!-- Outer energy ring -->
    <circle cx="256" cy="256" r="190" fill="none" stroke="url(#gradient-primary)" stroke-width="8" stroke-dasharray="10 20" opacity="0.6" />
    <circle cx="256" cy="256" r="160" fill="none" stroke="url(#gradient-primary)" stroke-width="3" opacity="0.3" />

    <!-- Stylized 'A' with sharp cyber edges and neon glow -->
    <path d="M256 90 L390 380 L320 380 L256 240 L192 380 L122 380 Z" fill="url(#gradient-primary)" />
    
    <!-- Glowing core bar -->
    <path d="M192 310 L320 310 L300 270 L212 270 Z" fill="#ffffff" opacity="0.9" />
    
    <!-- Central Aura Diamond -->
    <polygon points="256,150 286,210 256,270 226,210" fill="#ffffff" opacity="0.95" />
  </g>
</svg>